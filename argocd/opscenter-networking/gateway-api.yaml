apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway-api
  namespace: argocd
spec:
  project: default
  source:
    chart: gateway-api
    repoURL: ghcr.io/appscode-charts
    targetRevision: v2025.3.14
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: envoy-gateway-system
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
