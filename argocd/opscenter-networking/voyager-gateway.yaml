apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: voyager-gateway
  namespace: argocd
spec:
  project: default
  source:
    chart: voyager-gateway
    repoURL: ghcr.io/appscode-charts
    targetRevision: v2026.1.15
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: envoy-gateway-system
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
