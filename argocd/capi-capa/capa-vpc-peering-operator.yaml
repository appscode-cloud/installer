apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capa-vpc-peering-operator
  namespace: argocd
spec:
  project: default
  source:
    chart: capa-vpc-peering-operator
    repoURL: ghcr.io/appscode-charts
    targetRevision: v2023.12.11
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: capa-system
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
