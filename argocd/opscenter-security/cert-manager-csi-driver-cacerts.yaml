apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-csi-driver-cacerts
  namespace: argocd
spec:
  project: default
  source:
    chart: cert-manager-csi-driver-cacerts
    repoURL: ghcr.io/appscode-charts
    targetRevision: v2026.1.15
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: cert-manager
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
