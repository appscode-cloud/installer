apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: service-backend
  namespace: argocd
spec:
  project: default
  source:
    chart: service-backend
    repoURL: ghcr.io/appscode-charts
    targetRevision: v2026.3.30
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: ace
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
