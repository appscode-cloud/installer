apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: config-syncer
  namespace: argocd
spec:
  project: default
  source:
    chart: config-syncer
    repoURL: ghcr.io/appscode-charts
    targetRevision: v0.15.4
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kubeops
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
