apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-presets
  namespace: argocd
spec:
  project: default
  source:
    chart: cluster-presets
    repoURL: ghcr.io/appscode-charts
    targetRevision: v2026.3.30
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kubeops
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
