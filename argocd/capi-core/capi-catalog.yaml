apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capi-catalog
  namespace: argocd
spec:
  project: default
  source:
    chart: capi-catalog
    repoURL: ghcr.io/appscode-charts
    targetRevision: v2024.10.24
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: capi-system
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
