apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snapshot-controller
  namespace: argocd
spec:
  project: default
  source:
    chart: snapshot-controller
    repoURL: ghcr.io/appscode-charts
    targetRevision: 3.0.6
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kubeops
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true

  ignoreDifferences:
  - jsonPointers:
    - /data
    kind: Secret
    name: snapshot-controller-apiserver-cert
    namespace: kubeops
  - group: admissionregistration.k8s.io
    kind: MutatingWebhookConfiguration
    name: snapshot-validation
    jqPathExpressions:
    - .webhooks[].clientConfig.caBundle
