apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: topolvm
  namespace: argocd
spec:
  project: default
  source:
    chart: topolvm
    repoURL: ghcr.io/appscode-charts
    targetRevision: 15.0.0
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: topolvm-system
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
