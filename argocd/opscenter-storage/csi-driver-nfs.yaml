apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: csi-driver-nfs
  namespace: argocd
spec:
  project: default
  source:
    chart: csi-driver-nfs
    repoURL: ghcr.io/appscode-charts
    targetRevision: v4.7.0
    helm:
      values: |
        ace-user-roles:
          enabled: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: kube-system
  syncPolicy:
    automated: {}
    syncOptions:
    - CreateNamespace=true
