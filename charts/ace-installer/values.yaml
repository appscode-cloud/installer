# Default values for ace-installer.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""
deploymentType: ""
offlineInstaller: false
installerVersion: ""
image:
  proxies:
    # r.appscode.com
    appscode: r.appscode.com
    # company/bin:tag
    dockerHub: ""
    # alpine, nginx etc.
    dockerLibrary: ""
    # ghcr.io/company/bin:tag
    ghcr: ghcr.io
    # quay.io/company/bin:tag
    quay: quay.io
    # registry.k8s.io/bin:tag
    kubernetes: registry.k8s.io
    microsoft: mcr.microsoft.com
    oracle: container-registry.oracle.com
    weaviate: cr.weaviate.io
# image:
#   proxies:
#     dockerHub: harbor.appscode.ninja/dockerhub
#     dockerLibrary: ""
#     ghcr: harbor.appscode.ninja/ghcr
#     quay: harbor.appscode.ninja/quay
#     kubernetes: harbor.appscode.ninja/k8s
#     microsoft: harbor.appscode.ninja/mcr
#     appscode: harbor.appscode.ninja/ac
registry:
  credentials: {}
  # username: "abc"
  # password: "xyz"
  certs: {}
  # ca.crt: "***"
  imagePullSecrets: []
  # imagePullSecrets: ["abc", "xyz"]
helm:
  createNamespace: true
  repositories:
    # oci://harbor.appscode.ninja/ac/appscode-charts
    appscode-charts-oci:
      url: oci://ghcr.io/appscode-charts
    # Repository used by the platform UI deploy wizards. Defaults to the same
    # upstream as appscode-charts-oci. When regcache.enabled is true, its URL is
    # rewritten to the in-cluster registry proxy that fronts ghcr.io/appscode-charts.
    appscode-wizards-oci:
      url: oci://ghcr.io/appscode-charts
  releases:
    ace:
      enabled: false
      version: "v2026.6.19"
    acerproxy:
      enabled: false
      version: "v2026.6.19"
    aceshifter:
      enabled: true
      version: "v2026.6.19"
    capi-catalog:
      enabled: false
      version: "v2024.10.24"
    catalog-manager:
      enabled: false
      version: "v2026.6.19"
    cert-manager:
      enabled: true
      version: "v1.19.3"
    cert-manager-csi-driver-cacerts:
      enabled: true
      version: "v2026.1.15"
    external-dns-operator:
      enabled: true
      version: "v2026.1.15"
    flux2:
      enabled: false
      version: "2.17.0"
    gateway-api:
      enabled: true
      version: "v2025.3.14"
    gateway-api-crds:
      enabled: true
      version: v1.4.1
    kubedb:
      enabled: true
      version: "v2026.6.19"
      values: # +doc-gen:break
        kubedb-provisioner:
          enabled: true
        kubedb-catalog:
          enabled: true
        kubedb-ops-manager:
          enabled: true
        kubedb-autoscaler:
          enabled: true
        kubedb-kubestash-catalog:
          enabled: true
        kubedb-schema-manager:
          enabled: false
        kubedb-metrics:
          enabled: false
        sidekick:
          enabled: false
    kubestash:
      enabled: false
      version: "v2026.6.19"
    kube-ui-server:
      enabled: true
      version: "v2026.6.19"
    license-proxyserver:
      enabled: true
      version: "v2026.2.16"
    opscenter-features:
      enabled: true
      version: "v2026.6.19"
    panopticon:
      enabled: true
      version: "v2026.6.22"
      values: # +doc-gen:break
        monitoring:
          agent: prometheus.io/operator
          enabled: true
          serviceMonitor:
            labels:
              release: kube-prometheus-stack
    prom-label-proxy:
      enabled: false
      version: "v2026.4.30"
    reloader:
      enabled: true
      version: "2.2.9"
    service-gateway-presets:
      enabled: false
      version: "v2026.6.19"
    stash-presets:
      enabled: false
      version: "v2026.6.19"
    # feature less chart versions
    cluster-manager-spoke:
      enabled: false
      version: "v2026.2.16"
    spoke-cluster-addons:
      enabled: false
      version: "v2026.2.16"
    vcluster:
      enabled: false
      version: "0.22.4"
    vcluster-plugin-ace:
      enabled: false
      version: "v0.0.3"
# controls the self management of the ace cluster
selfManagement:
  createCAPICluster: false
  import: true
  targetIPs: []
  enableFeatures: []
  disableFeatures: []
  useGateway: false
precheck:
  enabled: true
  # Docker registry containing app image
  image:
    # Docker registry used to pull app container image
    registry: appscode
    # App container image
    repository: b3
    # Overrides the image tag whose default is the chart appVersion.
    tag: ""
    pullPolicy: Always
  podAnnotations: {}
  podSecurityContext: {}
  # fsGroup: 2000

  securityContext: # +doc-gen:break
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}
tester:
  # Docker registry containing app image
  image:
    # Docker registry used to pull app container image
    registry: appscode
    # App container image
    repository: kubectl-nonroot
    # Overrides the image tag whose default is the chart appVersion.
    tag: "1.34"
    pullPolicy: IfNotPresent
  podAnnotations: {}
  podSecurityContext: {}
  # fsGroup: 2000

  securityContext: # +doc-gen:break
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  nodeSelector: {}
  tolerations: []
  affinity: {}

# In-cluster pull-through Docker registry cache, deployed via the regcache
# subchart (charts/regcache). When enabled (the default), it proxies the upstream
# registry (ghcr.io by default) so ghcr.io/appscode-charts images are served from
# within the cluster, and the appscode-wizards-oci HelmRepository is rewritten to
# pull through this cache instead of directly from ghcr.io.
# See charts/regcache/values.yaml for the full set of tunables.
regcache:
  enabled: true
  replicaCount: 1
  nameOverride: ""
  fullnameOverride: ""
  # Docker registry fqdn used to pull the registry image.
  registryFQDN: ghcr.io
  image:
    # Docker registry used to pull the registry image
    registry: appscode-images
    # registry container image
    repository: registry
    # Overrides the image tag
    tag: "3.1.1"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  # Upstream registry URL that this instance proxies as a pull-through cache.
  remoteURL: https://ghcr.io
  # How long a cached blob/manifest is kept before the pull-through cache
  # scheduler purges it. The cache has no capacity-based (LRU) eviction, so the
  # on-disk size is roughly the set of distinct artifacts pulled within this
  # window. Accepts a Go duration (e.g. 24h, 72h, 168h).
  ttl: "72h"
  # Optional credentials for authenticating against the upstream registry.
  # Leave empty for anonymous pulls (ghcr.io/appscode-charts is public).
  username: ""
  password: ""
  podAnnotations: {}
  podSecurityContext: # +doc-gen:break
    fsGroup: 65534
  securityContext: # +doc-gen:break
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
  service:
    type: ClusterIP
    port: 5000
  persistence:
    enabled: true
    # StorageClass for the cache PVC. When empty, falls back to
    # infra.storageClass.name below; if that is also unset, the cluster's default
    # StorageClass is used. Use a StorageClass with `allowVolumeExpansion: true`
    # to grow the cache later via a helm upgrade.
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # Storage class fallback for the cache PVC (used when persistence.storageClass
  # is empty). Set this to the storage class ACE uses for its data/backups.
  infra:
    storageClass:
      name: ""
  distro:
    openshift: false
    ubi: ""
options: ""
