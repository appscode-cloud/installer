{{ $infra := .Values.infra }}
{{- if .Values.global }}
{{- $infra = .Values.global.infra }}
{{- end }}

{{- if and .Values.enabled .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "regcache.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "regcache.labels" . | nindent 4 }}
spec:
  accessModes:
  - {{ .Values.persistence.accessMode | default "ReadWriteOnce" }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- else if $infra.storageClass.name }}
  storageClassName: {{ $infra.storageClass.name }}
  {{- end }}
{{- end }}
