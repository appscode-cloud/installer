{{- if .Values.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "regcache.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "regcache.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  ports:
  - name: registry
    port: {{ .Values.service.port }}
    targetPort: registry
    protocol: TCP
  selector:
    {{- include "regcache.selectorLabels" . | nindent 4 }}
{{- end }}
