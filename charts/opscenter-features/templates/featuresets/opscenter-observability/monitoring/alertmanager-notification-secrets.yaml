{{- $ns := "monitoring" -}}
{{- if eq (include "distro.openshift" .) "true" -}}
{{- $ns = "openshift-user-workload-monitoring" -}}
{{- else if eq (include "distro.rancher" .) "true" -}}
{{- $ns = "cattle-monitoring-system" -}}
{{- end -}}

{{- if and (ne $ns "openshift-user-workload-monitoring") (ne $ns "cattle-monitoring-system") }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $ns }}
---
{{- end }}

{{- if and .Values.notifications.email.enabled .Values.notifications.email.authSecretName .Values.notifications.email.authSecretKey .Values.notifications.email.authPassword }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.notifications.email.authSecretName }}
  namespace: {{ $ns }}
stringData:
  {{ .Values.notifications.email.authSecretKey }}: {{ .Values.notifications.email.authPassword | quote }}
---
{{- end }}

{{- if and .Values.notifications.webhook.enabled .Values.notifications.webhook.urlSecretName .Values.notifications.webhook.urlSecretKey .Values.notifications.webhook.url }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.notifications.webhook.urlSecretName }}
  namespace: {{ $ns }}
stringData:
  {{ .Values.notifications.webhook.urlSecretKey }}: {{ .Values.notifications.webhook.url | quote }}
{{- end }}
