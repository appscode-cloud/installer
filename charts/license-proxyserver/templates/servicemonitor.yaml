{{- if eq "prometheus.io/operator" ( include "monitoring.agent" . ) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "license-proxyserver.fullname" . }}-metrics-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "license-proxyserver.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/service-account.name: {{ include "license-proxyserver.serviceAccountName" . }}
type: kubernetes.io/service-account-token
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "license-proxyserver.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
  {{- if eq "true" ( include "monitoring.apply-servicemonitor-label" . ) }}
    {{- include "monitoring.servicemonitor-label" . | nindent 4 }}
  {{- else }}
    {{- include "license-proxyserver.selectorLabels" . | nindent 4 }}
  {{- end }}
spec:
  namespaceSelector:
    matchNames:
    - {{ .Release.Namespace }}
  selector:
    matchLabels:
      {{- include "license-proxyserver.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: api
    authorization:
      type: Bearer
      credentials:
        name: {{ include "license-proxyserver.fullname" . }}-metrics-token
        key: token
    scheme: https
    interval: 10s
    relabelings:
      - action: labeldrop
        regex: (pod|service|endpoint|namespace)
    tlsConfig:
      ca:
        secret:
          name: {{ include "license-proxyserver.fullname" . }}-apiserver-cert
          key: ca.crt
      serverName: "{{ include "license-proxyserver.fullname" . }}.{{ .Release.Namespace }}.svc"
  - port: telemetry
    authorization:
      type: Bearer
      credentials:
        name: {{ include "license-proxyserver.fullname" . }}-metrics-token
        key: token
    scheme: http
    interval: 10s
{{- end }}
