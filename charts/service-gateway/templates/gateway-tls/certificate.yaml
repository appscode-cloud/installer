{{- if not (eq .Values.infra.tls.issuer "external") }}

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "tenant.name" . }}-gw
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "service-gateway.labels" . | nindent 4 }}
spec:
  secretName: {{ include "tenant.name" . }}-gw-cert
  secretTemplate:
    annotations:
      vcluster.loft.sh/force-sync: "true"
  issuerRef:
    group: cert-manager.io
    kind: Issuer
    name: {{ include "tenant.name" . }}-gw
  {{- if eq .Values.infra.hostType "ip" }}
  ipAddresses:
    - "{{ .Values.infra.host }}"
  dnsNames:
    - {{ include "tenant.name" . }}-nats
    - {{ include "tenant.name" . }}-nats.{{ .Release.Namespace }}.svc
    - {{ include "tenant.name" . }}-nats.{{ .Release.Namespace }}.svc.cluster.local
    - {{ include "tenant.name" . }}-s3proxy
    - {{ include "tenant.name" . }}-s3proxy.{{ .Release.Namespace }}.svc
    - {{ include "tenant.name" . }}-s3proxy.{{ .Release.Namespace }}.svc.cluster.local
  {{- end }}

  {{- if eq .Values.infra.hostType "domain" }}
  dnsNames:
    - {{ include "gateway.domain" . }}
  commonName: {{ include "gateway.domain" . }}
  {{- end }}
  usages:
    - key agreement
    - digital signature
    - server auth
  {{- if .Values.infra.tls.jks.password }}
  keystores:
    jks:
      create: true
      alias: aws
      passwordSecretRef:
        name: {{ include "tenant.name" . }}-gw-jkscred
        key: password
  {{- end }}

{{- end }}
