{{ if (index .Values "gateway" "enabled") }}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ace.fullname" . }}
  namespace: {{ .Release.Namespace }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "ace.fullname" . }}
    namespace: {{ .Release.Namespace }}
    sectionName: https
  {{- if eq .Values.global.platform.hostType "domain" }}
  hostnames:
    - {{ .Values.global.platform.host }}
    {{- if eq (include "ace.gateway.migrationActive" .) "true" }}
    - {{ include "ace.gateway.fqdn" . }}
    {{- end }}
  {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "ace.fullname" . }}-platform-api
      namespace: {{ .Release.Namespace }}
      port: 80
      weight: 1
    timeouts: # They default to 15s.
      backendRequest: 2m
      request: 2m
  - matches:
    - path:
        type: PathPrefix
        value: /accounts
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "ace.fullname" . }}-platform-api
      namespace: {{ .Release.Namespace }}
      port: 80
      weight: 1
    timeouts:
      backendRequest: 2m
      request: 2m
  - matches:
    - path:
        type: PathPrefix
        value: /console
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "ace.fullname" . }}-cluster-ui
      namespace: {{ .Release.Namespace }}
      port: 80
      weight: 1
  - matches:
    - path:
        type: PathPrefix
        value: /db
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "ace.fullname" . }}-kubedb-ui
      namespace: {{ .Release.Namespace }}
      port: 80
      weight: 1
  - matches:
    - path:
        type: PathPrefix
        value: /id
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "ace.fullname" . }}-platform-ui
      namespace: {{ .Release.Namespace }}
      port: 80
      weight: 1
  {{- if (index .Values "grafana" "enabled") }}
  - matches:
    - path:
        type: PathPrefix
        value: /grafana
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "ace.fullname" . }}-grafana
      namespace: {{ .Release.Namespace }}
      port: 80
      weight: 1
    timeouts:
      backendRequest: 2m
      request: 2m
  {{- end }}
  {{- if (index .Values "perses" "enabled") }}
  - matches:
    - path:
        type: PathPrefix
        value: /observe
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "ace.fullname" . }}-perses
      namespace: {{ .Release.Namespace }}
      port: 8080
      weight: 1
    timeouts:
      backendRequest: 2m
      request: 2m
  {{- end }}
  - matches:
    - path:
        type: PathPrefix
        value: /prometheus
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "ace.fullname" . }}-trickster
      namespace: {{ .Release.Namespace }}
      port: 4000
      weight: 1
    timeouts:
      backendRequest: 2m
      request: 2m
{{- end }}
