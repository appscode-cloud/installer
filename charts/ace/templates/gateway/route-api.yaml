{{- if and (index .Values "gateway" "enabled") (eq .Values.global.platform.hostType "domain") }}
{{- $apiHosts := list }}
{{- if eq .Values.global.platform.deploymentType "Hosted" }}
  {{- $apiHosts = append $apiHosts (printf "api.%s" .Values.global.platform.host) }}
{{- end }}
{{- if eq .Values.global.platform.host "appscode.com" }}
  {{- $apiHosts = append $apiHosts "api.byte.builders" }}
{{- end }}
{{- if $apiHosts }}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ace.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  {{- with .Values.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: {{ include "ace.fullname" . }}
    namespace: {{ .Release.Namespace }}
    sectionName: https
  hostnames:
    {{- range $apiHosts }}
    - {{ . }}
    {{- end }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    backendRefs:
    - group: ""
      kind: Service
      name: {{ include "ace.fullname" . }}-platform-api
      namespace: {{ .Release.Namespace }}
      port: 80
      weight: 1
    timeouts:
      backendRequest: 2m
      request: 2m
{{- end }}
{{- end }}
