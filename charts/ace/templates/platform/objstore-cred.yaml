{{ $objstore := .Values.global.infra.objstore }}

{{- if and (include "settings.objstoreSecretName" .) (or $objstore.s3 $objstore.azure $objstore.gcs) }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ include "settings.objstoreSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ace.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- with $objstore.s3 }}
  {{- with .AWS_ACCESS_KEY_ID }}
  AWS_ACCESS_KEY_ID: {{ . | quote }}
  {{- end }}
  {{- with .AWS_SECRET_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: {{ . | quote }}
  {{- end }}
  {{- with .CA_CERT_DATA }}
  ca.crt: {{ . | quote }}
  {{- end }}
  {{- with .AWS_REGION }}
  AWS_REGION: {{ . | quote }}
  {{- end }}
{{- end }}

{{- with $objstore.azure }}
  {{- with .AZURE_ACCOUNT_NAME }}
  AZURE_ACCOUNT_NAME: {{ . | quote }}
  {{- end }}
  {{- with .AZURE_ACCOUNT_KEY }}
  AZURE_ACCOUNT_KEY: {{ . | quote }}
  {{- end }}
{{- end }}

{{- with $objstore.gcs }}
  {{- with .GOOGLE_SERVICE_ACCOUNT_JSON_KEY }}
  sa.json: {{ . | quote }}
  {{- end }}
{{- end }}

{{- end }}
